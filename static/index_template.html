<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>__TEMPLATE_TITLE__</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header class="page-header">
        <div class="header-inner">
            <div>
                <p class="eyebrow">Movie collection</p>
                <h1>__TEMPLATE_USER__'s Library</h1>
                <p class="subtitle">
                    __TEMPLATE_COUNT__ movie(s) saved in __TEMPLATE_TITLE__
                </p>
            </div>

            <div class="toolbar">
                <input
                    id="movie-search"
                    class="search-input"
                    type="text"
                    placeholder="Search movies..."
                >
            </div>
        </div>
    </header>

    <main class="page-content">
        <section id="movie-grid" class="movie-grid">
            __TEMPLATE_MOVIE_GRID__
        </section>
    </main>

    <script>
        const searchInput = document.getElementById("movie-search");
        const cards = Array.from(document.querySelectorAll(".movie-card"));

        searchInput.addEventListener("input", () => {
            const query = searchInput.value.trim().toLowerCase();

            cards.forEach((card) => {
                const title = card.dataset.title || "";
                const isVisible = title.includes(query);
                card.style.display = isVisible ? "" : "none";
            });
        });
    </script>
</body>
</html>
